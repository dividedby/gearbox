name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # --- Selfchecks for hook scripts and bench tools ---
      - name: Selfcheck log-routing.py
        run: python3 hooks/scripts/log-routing.py --selfcheck

      - name: Selfcheck label.py
        run: python3 bench/label.py --selfcheck

      - name: Selfcheck capture-baseline.py
        run: python3 hooks/scripts/capture-baseline.py --selfcheck

      - name: Selfcheck dashboard.py
        run: python3 bench/dashboard.py --selfcheck

      - name: Selfcheck eval.py
        run: python3 bench/eval.py --selfcheck

      - name: Selfcheck run-live.py
        run: python3 bench/run-live.py --selfcheck

      - name: Selfcheck migrate-logs.py
        run: python3 bench/migrate-logs.py --selfcheck

      - name: Selfcheck recommend.py
        run: python3 bench/recommend.py --selfcheck

      - name: Selfcheck inject-routing.py
        run: python3 hooks/scripts/inject-routing.py --selfcheck

      - name: Selfcheck budget_common.py
        run: python3 hooks/scripts/budget_common.py --selfcheck

      - name: Selfcheck enforce-budget.py
        run: python3 hooks/scripts/enforce-budget.py --selfcheck

      - name: Selfcheck budget-warn.py
        run: python3 hooks/scripts/budget-warn.py --selfcheck

      # --- Spec-vs-code consistency (fails build on drift) ---
      # ponytail: YAML "linting" of agent frontmatter is covered by
      # check_consistency.py's frontmatter parse rather than adding a
      # yamllint dependency.
      - name: Consistency check (real)
        run: python3 bench/check_consistency.py

      - name: Selfcheck check_consistency.py
        run: python3 bench/check_consistency.py --selfcheck

      # --- JSON-validate manifests ---
      - name: Validate JSON manifests
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          python3 -c "import json; json.load(open('hooks/hooks.json'))"
